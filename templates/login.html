{% extends "base.html" %}
{% block title %}Sign In — GAHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-wrapper">
        <!-- Illustration Side -->
        <div class="auth-illustration">
            <div class="illust-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
            </div>
            <h2>Welcome back!</h2>
            <p>Sign in to access your projects, spreadsheets, and collaborative workspace.</p>
        </div>

        <!-- Auth Card -->
        <div class="auth-card glass-card">
            <h1>Sign In</h1>
            <p class="auth-subtitle">Continue to your workspace</p>

            <form method="POST" action="{{ url_for('main.login') }}">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control"
                           placeholder="you@example.com" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="{{ url_for('main.signup') }}">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
